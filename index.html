    <style>
        :root {
            --green-50: #f0fdf4;
            --green-100: #dcfce7;
            --green-400: #4ade80;
            --green-500: #22c55e;
            --green-600: #16a34a;
            --green-700: #15803d;
            --blue-50: #eff6ff;
            --blue-100: #dbeafe;
            --blue-400: #60a5fa;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --red-100: #fee2e2;
            --red-500: #ef4444;
            --red-600: #dc2626;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --purple-100: #f3e8ff;
            --purple-600: #9333ea;
            --indigo-50: #eef2ff;
            --indigo-200: #c7d2fe;
            --indigo-600: #4f46e5;
            --yellow-100: #fef9c3;
            --white: #ffffff;
            --black: #000000;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--gray-100);
            padding-bottom: 5rem;
        }

        .container {
            max-width: 42rem;
            margin-left: auto;
            margin-right: auto;
        }

        .hidden {
            display: none !important;
        }

        /* App container and header */
        .app-header {
            background-color: var(--green-600);
            color: var(--white);
            padding: 1rem;
            position: sticky;
            top: 0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            z-index: 20;
        }

        .header-content {
            max-width: 36rem;
            margin: auto;
        }
        
        /* Стили для контейнера заголовка и логотипа */
        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
        }

        .app-logo {
            width: 40px;
            height: 40px;
            margin-right: 0.75rem;
            border-radius: 0.5rem;
        }

        .app-title {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0; /* Убираем отступ, так как он теперь на контейнере */
            color: var(--white);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .header-content .date-input,
        .header-content .player-input {
            width: 100%;
            text-align: center;
            font-weight: 700;
            border-radius: 0.5rem;
            padding: 0.5rem;
            border: 2px solid;
            color: var(--white);
        }

        .header-content .date-input {
            font-size: 1.125rem;
            background-color: var(--green-700);
            border-color: var(--green-500);
            margin-bottom: 0.75rem;
        }

        .player-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        #player1Name {
            background-color: var(--blue-500);
            border-color: var(--blue-400);
        }

        #player2Name {
            background-color: var(--green-500);
            border-color: var(--green-400);
        }

        #player1Name.error, #player2Name.error {
            border-color: var(--red-600);
            background-color: var(--red-100);
            color: var(--red-600);
        }

        .header-content .player-input::placeholder {
            color: var(--white);
            opacity: 0.75;
        }

        #player1Name.error::placeholder, #player2Name.error::placeholder {
            color: var(--red-600);
            opacity: 0.7;
        }

        /* Nine selector */
        .nine-selector {
            background-color: var(--white);
            border-bottom: 1px solid var(--gray-200);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 130px; /* Adjusted for new title */
            z-index: 10;
        }

        .nine-selector-content {
            max-width: 36rem;
            margin: auto;
            display: flex;
            align-items: center;
            padding: 0.75rem;
        }

        .nine-selector-content button {
            flex: 1;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .nine-selector-content button.active {
            background-color: var(--green-500);
            color: var(--white);
        }

        .nine-selector-content button.inactive {
            background-color: var(--gray-200);
            color: var(--gray-600);
        }

        .nine-selector-content button:disabled {
            cursor: not-allowed;
        }

        .nine-selector-content .spacer {
            width: 0.5rem;
        }

        /* Main content */
        .main-content {
            padding: 1rem;
        }

        .card {
            background-color: var(--white);
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .scorecard-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Prevents column width changes */
        }

        .scorecard-table th,
        .scorecard-table td {
            border: 1px solid var(--gray-300);
            padding: 0.5rem;
            text-align: center;
        }

        .scorecard-table th {
            background-color: var(--gray-800);
            color: var(--white);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .scorecard-table .hole-col {
            width: 4rem;
            background-color: var(--purple-600);
        }

        .scorecard-table .par-col {
            width: 4rem;
            background-color: var(--indigo-600);
        }

        .scorecard-table tbody tr:nth-child(even) {
            background-color: var(--gray-50);
        }

        .score-cell, .par-cell {
            cursor: pointer;
            border-radius: 0.25rem;
            transition: all 0.2s;
        }
        
        .par-cell {
             padding: 0.5rem;
             font-weight: 700;
             font-size: 1.125rem;
        }

        .par-cell:hover {
            background-color: var(--indigo-200);
        }
        
        .score-cell {
            padding: 0.5rem;
            font-weight: 700;
            font-size: 1.125rem;
        }

        .score-cell:hover {
            opacity: 0.9;
        }

        .total-row {
            background-color: var(--gray-800) !important;
            color: var(--white);
            font-weight: 700;
        }

        /* Score colors */
        .score-default { background-color: var(--gray-50); border: 2px solid var(--gray-200); }
        .score-birdie { background-color: var(--red-500); color: var(--white); border: 2px solid var(--red-600); }
        .score-par { background-color: var(--blue-500); color: var(--white); border: 2px solid var(--blue-600); }
        .score-bogey { background-color: var(--green-500); color: var(--white); border: 2px solid var(--green-600); }
        .score-double { background-color: var(--gray-500); color: var(--white); border: 2px solid var(--gray-600); }
        .score-triple { background-color: var(--black); color: var(--white); border: 2px solid var(--gray-800); }

        /* Total Score Section */
        .totals-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            text-align: center;
            padding: 1rem;
        }
        
        .totals-card .score-display {
            font-size: 2.25rem;
            font-weight: 700;
        }
        
        .totals-card .player1-score { color: var(--blue-600); }
        .totals-card .player2-score { color: var(--green-600); }
        .totals-card .player-name { font-size: 0.75rem; color: var(--gray-500); margin-top: 0.25rem; }
        .totals-card .to-par { font-size: 0.875rem; font-weight: 600; margin-top: 0.5rem; }
        .totals-card .player1-par { color: var(--blue-700); }
        .totals-card .player2-par { color: var(--green-700); }

        /* Legend */
        .legend-card {
            padding: 1rem;
        }
        .legend-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 0.75rem;
        }
        .legend-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.75rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .legend-color-box {
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 0.25rem;
        }

        /* Finish button */
        .finish-button {
            width: 100%;
            background-color: var(--green-500);
            color: var(--white);
            padding: 1rem;
            border-radius: 0.75rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: background-color 0.2s;
        }
        .finish-button:hover {
            background-color: var(--green-600);
        }

        /* Modals (Number/Par Selectors) */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 1rem;
        }
        .modal-content {
            background-color: var(--white);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 1.5rem;
            width: 100%;
            max-width: 20rem;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .modal-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--gray-800);
        }
        .modal-close-btn {
            color: var(--gray-400);
            cursor: pointer;
            background: none;
            border: none;
        }
        .modal-close-btn:hover {
            color: var(--gray-600);
        }
        .number-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }
        .par-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .number-grid button {
            background-color: var(--green-500);
            color: var(--white);
            font-weight: 700;
            font-size: 1.25rem;
            padding: 1rem 0;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 1px 3px 0 rgba(0,0,0,.1),0 1px 2px 0 rgba(0,0,0,.06);
            transition: background-color 0.2s;
        }
        .number-grid button:hover { background-color: var(--green-600); }
        .number-grid button:active { background-color: var(--green-700); }
        .par-grid button {
            background-color: var(--blue-500);
            color: var(--white);
            font-weight: 700;
            font-size: 1.875rem;
            padding: 2rem 0;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 1px 3px 0 rgba(0,0,0,.1),0 1px 2px 0 rgba(0,0,0,.06);
            transition: background-color 0.2s;
        }
        .par-grid button:hover { background-color: var(--blue-600); }
        .par-grid button:active { background-color: var(--blue-700); }

        /* Email Screen */
        .email-screen-container {
            min-height: 100vh;
            background-image: linear-gradient(to bottom right, var(--green-50), var(--green-100));
            padding: 1rem;
        }

        .email-card {
            background-color: var(--white);
            border-radius: 0.75rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .email-title {
            font-size: 1.875rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--green-600);
        }
        
        .final-scorecard-table {
            width: 100%;
            font-size: 0.875rem;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .final-scorecard-table th, .final-scorecard-table td {
            border: 2px solid var(--gray-400);
            padding: 0.5rem;
            text-align: center;
        }

        .final-scorecard-table th:first-child,
        .final-scorecard-table td:first-child {
             width: 20%;
             text-align: left;
             padding-left: 0.5rem;
        }
        
        .final-scorecard-table th {
            font-weight: 700;
        }
        
        .final-scorecard-table thead tr {
            background-color: var(--gray-200);
        }

        .final-scorecard-table .hole-header {
            background-color: var(--yellow-100);
        }
        
        .final-scorecard-table .out-in-header {
            background-color: var(--gray-300);
        }

        .final-scorecard-table .total-header {
             background-color: var(--gray-400);
        }

        .final-scorecard-table .par-row { background-color: var(--blue-50); }
        .final-scorecard-table .par-cell-final { background-color: var(--blue-100); font-weight: 700; font-size: 1.125rem;}
        .final-scorecard-table .out-in-total { background-color: var(--gray-200); font-weight: 700; font-size: 1rem; }
        .final-scorecard-table .grand-total { background-color: var(--gray-300); font-weight: 700; font-size: 1.1rem; }
        
        .player1-grand-total { background-color: var(--blue-100); }
        .player2-grand-total { background-color: var(--green-100); }

        .share-button-container {
            margin-top: 1.5rem;
            background-color: var(--white);
            border-radius: 0.75rem;
            padding: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }

        .action-button, .back-button {
            width: 100%;
            padding: 1rem;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1.125rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .action-button {
            background-color: var(--blue-500);
            color: var(--white);
            margin-bottom: 0.75rem;
        }
        .action-button:disabled {
            background-color: var(--gray-300);
            cursor: not-allowed;
        }

        .download-button {
            background-color: var(--green-500);
        }

        .back-button {
            background-color: var(--gray-500);
            color: var(--white);
        }

        /* Mobile adjustments */
        @media (max-width: 640px) {
            .app-header {
                padding: 0.75rem;
            }
            .nine-selector {
                top: 125px; /* Adjust sticky top position */
            }
            .main-content {
                padding: 0.75rem;
            }
            .scorecard-table th, .scorecard-table td {
                padding: 0.4rem;
                font-size: 0.875rem;
            }
            .score-cell, .par-cell {
                font-size: 1rem;
                padding: 0.4rem;
            }
            .final-scorecard-table th, .final-scorecard-table td {
                padding: 0.3rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="game-screen">

                     <div class="legend-grid">
                        <div class="legend-item">
                            <div class="legend-color-box" style="background-color: var(--red-500);"></div>
                            <span>Пар -1 (Birdie)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color-box" style="background-color: var(--blue-500);"></div>
                            <span>Пар (Par)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color-box" style="background-color: var(--green-500);"></div>
                            <span>Пар +1 (Bogey)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color-box" style="background-color: var(--gray-500);"></div>

                        </div>
                        <div class="legend-item">

                <div style="margin-top: 1rem;">
                    <button id="finish-game-btn" class="finish-button">Завершить игру</button>

        <div id="email-screen" class="hidden">
             <div class="email-screen-container">
                <div class="container">
                    <div id="scorecard-capture-area" style="padding: 1rem; background-color: var(--white); border-radius: 0.75rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);">
                        <!-- Логотип заменен на SVG -->
                        <div style="text-align: center; margin-bottom: 1rem;">
                            <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" style="width: 60px; height: 60px; border-radius: 8px;">
                                <rect width="60" height="60" rx="12" ry="12" fill="#16a34a"/>
                                <g fill="white" stroke-linecap="round" stroke-linejoin="round">

                                    <path d="M38 40 C 38 37, 50 37, 50 40 A 6 3 0 0 1 38 40 Z" />
                            
                                    <!-- Scorecard -->
                                    <path d="M16 14 C 14.343 14 13 15.343 13 17 L 13 32 C 13 33.657 14.343 35 16 35 L 29 35 C 30.657 35 32 33.657 32 32 L 32 17 C 32 15.343 30.657 14 29 14 L 16 14 Z M 17 20 L 19 22 L 23 18 M 17 26 L 28 26 M 17 30 L 24 30" stroke="white" stroke-width="2" fill="none" />
                            
                                    <!-- Golf Ball -->
                                    <circle cx="25" cy="41" r="10"/>
                                    <g fill="#16a34a" transform="translate(25, 41)">

                                        <circle cx="-5" cy="0" r="1"/><circle cx="5" cy="0" r="1"/>
                                        <circle cx="0" cy="-5" r="1"/><circle cx="0" cy="5" r="1"/>
                                        <circle cx="-3.5" cy="-3.5" r="1"/><circle cx="3.5" cy="3.5" r="1"/>

    <div id="par-selector" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Выберите Par</h3>
                <button class="modal-close-btn" onclick="closeParSelector()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="par-grid">
                <button onclick="selectParValue(3)">3</button>
                <button onclick="selectParValue(4)">4</button>
                <button onclick="selectParValue(5)">5</button>
            </div>
        </div>

    <div id="number-selector" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="number-selector-title" class="modal-title">Выберите счет</h3>
                <button class="modal-close-btn" onclick="closeNumberSelector()">
                     <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="number-selector-grid" class="number-grid">
                <!-- Buttons will be generated by JavaScript -->
            </div>
        </div>

    <script>
        // --- STATE MANAGEMENT ---
        const state = {
            currentNine: 0,
            player1Name: '',
            player2Name: '',
            gameDate: new Date().toISOString().split('T')[0],
            parValues: [4, 3, 5, 4, 4, 3, 5, 4, 4, 4, 3, 5, 4, 4, 3, 5, 4, 4],
            scores: {
                player1: Array(18).fill(null),
                player2: Array(18).fill(null)
            },
            editingPar: null, // hole index
            editingScore: null, // { player: 'player1', hole: 0 }
            showEmailScreen: false,
        };

        // --- DOM ELEMENTS ---
        const dom = {
            gameScreen: document.getElementById('game-screen'),
            emailScreen: document.getElementById('email-screen'),
            gameDate: document.getElementById('gameDate'),
            player1Name: document.getElementById('player1Name'),
            player2Name: document.getElementById('player2Name'),
            nine0Btn: document.getElementById('nine-0-btn'),
            nine1Btn: document.getElementById('nine-1-btn'),
            player1Header: document.getElementById('player1-header'),
            player2Header: document.getElementById('player2-header'),
            scorecardBody: document.getElementById('scorecard-body'),
            totalsCard: document.getElementById('totals-card'),
            finishGameBtn: document.getElementById('finish-game-btn'),
            backToGameBtn: document.getElementById('back-to-game-btn'),
            shareBtn: document.getElementById('share-btn'),
            downloadBtn: document.getElementById('download-btn'),
            finalScorecardTablesContainer: document.getElementById('final-scorecard-tables-container'),
            finalSummaryLegend: document.getElementById('final-summary-legend'),
            parSelector: document.getElementById('par-selector'),
            numberSelector: document.getElementById('number-selector'),
            numberSelectorTitle: document.getElementById('number-selector-title'),
            numberSelectorGrid: document.getElementById('number-selector-grid'),
        };

        // --- UTILITY FUNCTIONS ---
        const calculateTotal = (playerScores) => playerScores.reduce((sum, score) => sum + (score || 0), 0);
        const getScoreColorClass = (score, par) => {
            if (!score) return 'score-default';
            const diff = score - par;
            if (diff === -1) return 'score-birdie';
            if (diff === 0) return 'score-par';
            if (diff === 1) return 'score-bogey';
            if (diff === 2) return 'score-double';
            return 'score-triple';
        };

        // --- RENDER FUNCTION ---
        function render() {
            // Update inputs
            dom.gameDate.value = state.gameDate;
            if (document.activeElement !== dom.player1Name) {
                dom.player1Name.value = state.player1Name;
            }
             if (document.activeElement !== dom.player2Name) {
                dom.player2Name.value = state.player2Name;
            }

            // Update headers
            dom.player1Header.textContent = state.player1Name || 'Игрок 1';
            dom.player2Header.textContent = state.player2Name || 'Игрок 2';

            // Update nine selector buttons
            dom.nine0Btn.className = state.currentNine === 0 ? 'active' : 'inactive';
            dom.nine1Btn.className = state.currentNine === 1 ? 'active' : 'inactive';

            // Render scorecard rows
            const startHole = state.currentNine * 9;
            const endHole = startHole + 9;
            dom.scorecardBody.innerHTML = ''; 

            for (let i = startHole; i < endHole; i++) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="background-color: var(--purple-100); font-weight: 700;">${i + 1}</td>
                    <td style="background-color: var(--indigo-50);">
                        <div class="par-cell" onclick="openParSelector(${i})">${state.parValues[i]}</div>
                    </td>
                    <td>
                        <div class="score-cell ${getScoreColorClass(state.scores.player1[i], state.parValues[i])}" onclick="openNumberSelector('player1', ${i})">
                            ${state.scores.player1[i] || '-'}
                        </div>
                    </td>
                    <td>
                        <div class="score-cell ${getScoreColorClass(state.scores.player2[i], state.parValues[i])}" onclick="openNumberSelector('player2', ${i})">
                            ${state.scores.player2[i] || '-'}
                        </div>
                    </td>
                `;
                dom.scorecardBody.appendChild(row);
            }

            // Render totals row
            const currentNinePars = state.parValues.slice(startHole, endHole);
            const player1CurrentScores = state.scores.player1.slice(startHole, endHole);
            const player2CurrentScores = state.scores.player2.slice(startHole, endHole);
            const totalRow = document.createElement('tr');
            totalRow.className = 'total-row';
            totalRow.innerHTML = `
                <td>OUT</td>
                <td style="font-size: 1.125rem;">${calculateTotal(currentNinePars)}</td>
                <td style="font-size: 1.25rem;">${calculateTotal(player1CurrentScores)}</td>
                <td style="font-size: 1.25rem;">${calculateTotal(player2CurrentScores)}</td>
            `;
            dom.scorecardBody.appendChild(totalRow);
            
            // Render totals card
            const p1currentTotal = calculateTotal(player1CurrentScores);
            const p2currentTotal = calculateTotal(player2CurrentScores);
            const parCurrentTotal = calculateTotal(currentNinePars);
            const p1toPar = p1currentTotal - parCurrentTotal;
            const p2toPar = p2currentTotal - parCurrentTotal;
            dom.totalsCard.innerHTML = `
                <div>
                    <div class="score-display player1-score">${p1currentTotal}</div>
                    <div class="player-name">${state.player1Name || 'Игрок 1'}</div>
                    <div class="to-par player1-par">К пару: ${p1toPar > 0 ? '+' : ''}${p1toPar}</div>
                </div>
                <div>
                    <div class="score-display player2-score">${p2currentTotal}</div>
                    <div class="player-name">${state.player2Name || 'Игрок 2'}</div>
                    <div class="to-par player2-par">К пару: ${p2toPar > 0 ? '+' : ''}${p2toPar}</div>
                </div>
            `;

            // Screen visibility
            dom.gameScreen.classList.toggle('hidden', state.showEmailScreen);
            dom.emailScreen.classList.toggle('hidden', !state.showEmailScreen);

            if (state.showEmailScreen) {
                renderEmailScreen();
            }
        }
        
        function renderEmailScreen() {
            const container = dom.finalScorecardTablesContainer;
            container.innerHTML = ''; 

            document.getElementById('final-game-date').textContent = `Дата игры: ${new Date(state.gameDate + 'T00:00:00').toLocaleDateString('ru-RU')}`;

            const parOut = calculateTotal(state.parValues.slice(0, 9));
            const parIn = calculateTotal(state.parValues.slice(9, 18));
            const p1Out = calculateTotal(state.scores.player1.slice(0, 9));
            const p1In = calculateTotal(state.scores.player1.slice(9, 18));
            const p2Out = calculateTotal(state.scores.player2.slice(0, 9));
            const p2In = calculateTotal(state.scores.player2.slice(9, 18));

            let outTableHTML = `
                <table class="final-scorecard-table">
                    <thead>
                        <tr>
                            <th>ЛУНКА</th>
                            ${Array.from({ length: 9 }, (_, i) => `<th class="hole-header">${i + 1}</th>`).join('')}
                            <th class="out-in-header">OUT</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="par-row">
                            <td style="font-weight: 700;">Par</td>
                            ${state.parValues.slice(0, 9).map(p => `<td class="par-cell-final">${p}</td>`).join('')}
                            <td class="out-in-total">${parOut}</td>
                        </tr>
                        <tr>
                            <td style="font-weight: 700;">${state.player1Name || 'Игрок 1'}</td>
                            ${state.scores.player1.slice(0, 9).map((s, i) => `<td class="${getScoreColorClass(s, state.parValues[i])}">${s || '-'}</td>`).join('')}
                            <td class="out-in-total">${p1Out}</td>
                        </tr>
                        <tr>
                            <td style="font-weight: 700;">${state.player2Name || 'Игрок 2'}</td>
                            ${state.scores.player2.slice(0, 9).map((s, i) => `<td class="${getScoreColorClass(s, state.parValues[i])}">${s || '-'}</td>`).join('')}
                            <td class="out-in-total">${p2Out}</td>
                        </tr>
                    </tbody>
                </table>`;
            
            let inTableHTML = `
                <table class="final-scorecard-table" style="margin-top: 1.5rem;">
                    <thead>
                        <tr>
                            <th>ЛУНКА</th>
                            ${Array.from({ length: 9 }, (_, i) => `<th class="hole-header">${i + 10}</th>`).join('')}
                            <th class="out-in-header">IN</th>
                            <th class="total-header">TL</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="par-row">
                            <td style="font-weight: 700;">Par</td>
                            ${state.parValues.slice(9, 18).map(p => `<td class="par-cell-final">${p}</td>`).join('')}
                            <td class="out-in-total">${parIn}</td>
                            <td class="grand-total">${parOut + parIn}</td>
                        </tr>
                        <tr>
                            <td style="font-weight: 700;">${state.player1Name || 'Игрок 1'}</td>
                            ${state.scores.player1.slice(9, 18).map((s, i) => `<td class="${getScoreColorClass(s, state.parValues[i + 9])}">${s || '-'}</td>`).join('')}
                            <td class="out-in-total">${p1In}</td>
                            <td class="grand-total player1-grand-total">${p1Out + p1In}</td>
                        </tr>
                        <tr>
                            <td style="font-weight: 700;">${state.player2Name || 'Игрок 2'}</td>
                            ${state.scores.player2.slice(9, 18).map((s, i) => `<td class="${getScoreColorClass(s, state.parValues[i + 9])}">${s || '-'}</td>`).join('')}
                            <td class="out-in-total">${p2In}</td>
                            <td class="grand-total player2-grand-total">${p2Out + p2In}</td>
                        </tr>
                    </tbody>
                </table>`;

            container.innerHTML = outTableHTML + inTableHTML;
            
            const totalPar = parOut + parIn;
            const p1Total = p1Out + p1In;
            const p2Total = p2Out + p2In;
            const p1TotalToPar = p1Total - totalPar;
            const p2TotalToPar = p2Total - totalPar;
            dom.finalSummaryLegend.innerHTML = `
                 <div class="card totals-card" style="margin-top: 1rem;">
                    <div>
                        <div class="score-display player1-score">${p1TotalToPar > 0 ? '+' : ''}${p1TotalToPar}</div>
                        <div class="player-name">${state.player1Name || 'Игрок 1'} (к пару)</div>
                    </div>
                    <div>
                        <div class="score-display player2-score">${p2TotalToPar > 0 ? '+' : ''}${p2TotalToPar}</div>
                        <div class="player-name">${state.player2Name || 'Игрок 2'} (к пару)</div>
                    </div>
                 </div>
                 <div class="card legend-card" style="margin-top: 1rem;">
                     <div class="legend-title">Легенда:</div>
                     <div class="legend-grid">
                        <div class="legend-item"><div class="legend-color-box" style="background-color: var(--red-500);"></div><span>Пар -1</span></div>
                        <div class="legend-item"><div class="legend-color-box" style="background-color: var(--blue-500);"></div><span>Пар</span></div>
                        <div class="legend-item"><div class="legend-color-box" style="background-color: var(--green-500);"></div><span>Пар +1</span></div>
                        <div class="legend-item"><div class="legend-color-box" style="background-color: var(--gray-500);"></div><span>Пар +2</span></div>
                        <div class="legend-item"><div class="legend-color-box" style="background-color: var(--black);"></div><span>Пар +3+</span></div>
                     </div>
                 </div>
            `;
        }
        
        // --- SHARING AND DOWNLOADING ---
        function showLoadingState(buttonId) {
            dom.shareBtn.disabled = true;
            dom.downloadBtn.disabled = true;
            const btn = document.getElementById(buttonId);
            if (btn) btn.innerHTML = 'Генерация...';
        }

        function hideLoadingState() {
            dom.shareBtn.disabled = false;
            dom.downloadBtn.disabled = false;
            dom.shareBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg> Поделиться`;
            dom.downloadBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg> Сохранить Scorecard`;
        }

        function generateScorecardImage(callback) {
            const captureArea = document.getElementById('scorecard-capture-area');
            const cards = captureArea.querySelectorAll('.card');
            cards.forEach(card => card.style.boxShadow = 'none');

            html2canvas(captureArea, { scale: 2, useCORS: true, backgroundColor: '#ffffff' })
                .then(canvas => {
                    cards.forEach(card => card.style.boxShadow = ''); // Restore shadow
                    canvas.toBlob(callback, 'image/png');
                });
        }

        function handleDownload() {
            showLoadingState('download-btn');
            generateScorecardImage(blob => {
                const link = document.createElement('a');
                link.download = `scorecard-${state.gameDate}.png`;
                link.href = URL.createObjectURL(blob);
                link.click();
                URL.revokeObjectURL(link.href);
                hideLoadingState();
            });
        }

        function handleShare(buttonId = 'share-btn') {
            showLoadingState(buttonId);
            generateScorecardImage(blob => {
                 const file = new File([blob], `scorecard-${state.gameDate}.png`, { type: 'image/png' });
                 const p1 = state.player1Name || 'Игрок 1';
                 const p2 = state.player2Name || 'Игрок 2';
                 const shareData = {
                    title: `Scorecard: ${p1} vs ${p2}`,
                    files: [file],
                 };

                 if (navigator.canShare && navigator.canShare({ files: [file] })) {
                     navigator.share(shareData)
                        .catch((error) => {
                            console.log('Sharing failed', error);
                            if (error.name !== 'AbortError') {
                                console.error('Не удалось поделиться файлом. Попробуйте скачать изображение и отправить его вручную.');
                            }
                        })
                        .finally(() => hideLoadingState());
                 } else {
                     console.error('Ваш браузер не поддерживает отправку файлов. Скачайте изображение и поделитесь им вручную.');
                     hideLoadingState();
                 }
            });
        }

        // --- EVENT HANDLERS & ACTIONS ---
        function handleNameChange() {
            const name1 = dom.player1Name.value.trim();
            const name2 = dom.player2Name.value.trim();

            state.player1Name = name1;
            state.player2Name = name2;

            if (name1 && name1 === name2) {
                dom.player1Name.classList.add('error');
                dom.player2Name.classList.add('error');
            } else {
                dom.player1Name.classList.remove('error');
                dom.player2Name.classList.remove('error');
            }
            render();
        }

        function setupEventListeners() {
            dom.gameDate.addEventListener('change', (e) => state.gameDate = e.target.value);
            dom.player1Name.addEventListener('input', handleNameChange);
            dom.player2Name.addEventListener('input', handleNameChange);
            dom.nine0Btn.addEventListener('click', () => {
                state.currentNine = 0;
                render();
            });
            dom.nine1Btn.addEventListener('click', () => {
                state.currentNine = 1;
                render();
            });
            dom.finishGameBtn.addEventListener('click', () => {
                state.showEmailScreen = true;
                render();
            });
            dom.backToGameBtn.addEventListener('click', () => {
                state.showEmailScreen = false;
                render();
            });
            dom.shareBtn.addEventListener('click', () => handleShare('share-btn'));
            dom.downloadBtn.addEventListener('click', handleDownload);
        }
        
        // Modal functions
        window.openParSelector = (hole) => {
            state.editingPar = hole;
            dom.parSelector.classList.remove('hidden');
        };

        window.closeParSelector = () => {
            state.editingPar = null;
            dom.parSelector.classList.add('hidden');
        };
        
        window.selectParValue = (value) => {
            state.parValues[state.editingPar] = value;
            closeParSelector();
            render();
        };

        window.openNumberSelector = (player, hole) => {
            state.editingScore = { player, hole };
            const p1Name = state.player1Name || 'Игрок 1';
            const p2Name = state.player2Name || 'Игрок 2';
            dom.numberSelectorTitle.textContent = `Лунка ${hole + 1} - ${player === 'player1' ? p1Name : p2Name}`;
            dom.numberSelectorGrid.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const button = document.createElement('button');
                button.textContent = i;
                button.onclick = () => selectScoreValue(i);
                dom.numberSelectorGrid.appendChild(button);
            }
            dom.numberSelector.classList.remove('hidden');
        };

        window.closeNumberSelector = () => {
            state.editingScore = null;
            dom.numberSelector.classList.add('hidden');
        };
        
        window.selectScoreValue = (value) => {
            const { player, hole } = state.editingScore;
            state.scores[player][hole] = value;
            closeNumberSelector();
            render();
        };

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            render();
        });
    </script>
</body>
</html>
